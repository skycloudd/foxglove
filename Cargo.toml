[package]
name = "foxglove"
version = "0.1.0"
edition = "2021"

[dependencies]
ariadne = "0.1"
chumsky = "0.9"
clap = { version = "4.1", features = ["derive"] }
pretty = { version = "0.11", features = ["termcolor"] }

[dev-dependencies]
insta = "1.28"

[profile.dev.package.insta]
opt-level = 3

[profile.dev.package.similar]
opt-level = 3
